<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<style>
  /* MENYEMBUNYIKAN ELEMEN BAWAAN BLOGGER */
  .post-header, .post-footer, .post-title, .sidebar-wrapper, .header-wrapper, #header, .footer-outer { display: none !important; }
  
  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    -webkit-tap-highlight-color: transparent;
  }
  
  body, html { 
    background: #000; 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    overflow: hidden; 
    height: 100%; 
    width: 100%;
  }

  /* WRAPPER UTAMA - FULL SCREEN DI SEMUA HP */
  .live-container {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100dvh; /* Mengikuti tinggi layar HP secara dinamis */
    background: #000;
    z-index: 9999;
    overflow: hidden;
    display: flex;
    justify-content: center;
  }

  .app-frame {
    position: relative;
    width: 100%;
    max-width: 500px; /* Batas lebar untuk Desktop agar tidak pecah */
    height: 100%;
    background: #000;
    cursor: pointer;
  }

  /* VIDEO BACKGROUND - FULL COVER */
  .video-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover; /* Video memenuhi layar seperti TikTok */
    z-index: 1;
  }

  .overlay-black {
    position: absolute;
    bottom: 0; left: 0; width: 100%; height: 60%;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    z-index: 2;
    pointer-events: none;
  }

  /* HEADER PROFILE */
  .live-header {
    position: absolute;
    top: env(safe-area-inset-top, 20px);
    left: 15px; right: 15px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
    pointer-events: none;
  }

  .profile-card {
    display: flex; align-items: center;
    background: rgba(0,0,0,0.4);
    padding: 4px 12px 4px 4px;
    border-radius: 30px;
    color: #fff;
    backdrop-filter: blur(10px);
  }

  .pfp { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #fff; margin-right: 10px; object-fit: cover; }

  .live-badge {
    background: #ff0050; color: #fff;
    padding: 3px 10px; border-radius: 4px;
    font-size: 11px; font-weight: bold;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

  /* GIFT NOTIFICATION */
  #giftBox { position: absolute; top: 100px; left: 15px; z-index: 15; width: 85%; pointer-events: none; }
  
  .gift-pop {
    display: flex; align-items: center;
    background: linear-gradient(90deg, rgba(255,0,80,0.85), rgba(255,165,0,0.6));
    color: #fff; padding: 8px 15px; border-radius: 30px;
    margin-bottom: 10px; font-size: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    animation: slideInOut 3.5s ease-in-out forwards;
  }

  @keyframes slideInOut { 
    0% { transform: translateX(-110%); opacity: 0; }
    10% { transform: translateX(0); opacity: 1; }
    85% { transform: translateX(0); opacity: 1; }
    100% { transform: translateX(120%); opacity: 0; }
  }

  /* CHAT BOX - LEBIH BESAR & JELAS */
  #chatBox {
    position: absolute; bottom: 120px; left: 15px;
    width: 80%; max-height: 220px;
    overflow: hidden; z-index: 10;
    display: flex; flex-direction: column-reverse;
    pointer-events: none;
  }

  .chat-row {
    background: rgba(0,0,0,0.25); color: #fff;
    padding: 6px 14px; border-radius: 12px;
    margin-bottom: 6px; font-size: 14px;
    line-height: 1.5; animation: chatIn 0.3s ease;
  }

  .user-gold { color: #ffd700; font-weight: bold; margin-right: 6px; }

  @keyframes chatIn { from { opacity: 0; transform: translateY(10px); } }

  /* HEART TAP-TAP */
  .heart-tap {
    position: absolute; font-size: 45px; z-index: 50;
    pointer-events: none; animation: fly 1.3s ease-out forwards;
  }

  @keyframes fly {
    0% { transform: scale(0.5) rotate(0deg); opacity: 1; }
    100% { transform: scale(2) translateY(-350px) rotate(30deg); opacity: 0; }
  }

  /* CTA BUTTON - FULL WIDTH */
  .cta-section { position: absolute; bottom: 35px; left: 5%; width: 90%; z-index: 100; }
  
  .btn-action {
    display: block; width: 100%; background: #fff; color: #000;
    text-align: center; padding: 18px; border-radius: 50px;
    font-weight: bold; font-size: 18px; text-decoration: none;
    box-shadow: 0 8px 25px rgba(255,255,255,0.3); transition: 0.2s;
  }

  .btn-action:active { transform: scale(0.96); }
</style>
</head>
