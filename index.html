// KOMENTAR
function randomComment() {
  let text = commentsList[Math.floor(Math.random()*commentsList.length)];

  if (Math.random() < 0.3) {
    text = text.replace("banget", "bangettt");

function commentLoop() {
  const el = document.createElement("div");
  el.className = "comment";

  const name = names[Math.floor(Math.random()*names.length)];
  const color = colors[Math.floor(Math.random()*colors.length)];

    : "";

  el.innerText = name + " sent " + gift + combo;

  document.querySelector(".container").appendChild(el);

}

function giftLoop() {
  const burst = Math.random() < 0.6 ? 1 : Math.floor(Math.random()*3)+1;

  for (let i = 0; i < burst; i++) {
    setTimeout(sendGift, i * 200);

}

// HEART
function heartLoop() {
